<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo Ristoranti</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">TastyDelivery</a>
            <div class="navbar-nav">
                <a class="nav-link active" href="catalogo.html">Catalogo</a>
                <a class="nav-link" href="ordine.html">Ordina ora!</a>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <h1 class="mb-4">Catalogo Ristoranti</h1>

                <div class="mb-4">
            <label for="tipologia" class="form-label">Filtra per tipologia</label>
            <select id="tipologia" class="form-select">
                <option>Tutte</option>
                <option>Pizzeria</option>
                <option>Giapponese</option>
                <option>Hamburgeria</option>
            </select>
        </div>

        <div class="row g-3">
            <div class="col-md-4">
                    <div class="card h-100">
                        <div class="card-body">
                            <h5 class="card-title"><a href="#">Bella Napoli</a></h5>
                            <p class="card-text">Tipologia: Pizzeria</p>
                        </div>
                    </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title"><a href="#">Sushi Zen</a></h5>
                        <p class="card-text">Tipologia: Giapponese</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h5 class="card-title"><a href="#">Old Wild West</a></h5>
                        <p class="card-text">Tipologia: Hamburgeria</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-light text-center py-3 mt-4">
        <small>© 2026 TastyDelivery - Contatti: info@tastydelivery.it</small>
    </footer>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
