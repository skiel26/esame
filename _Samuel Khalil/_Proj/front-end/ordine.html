<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo Ristoranti</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">TastyDelivery</a>
            <div class="navbar-nav">
                <a class="nav-link" href="catalogo.html">Catalogo</a>
                <a class="nav-link active" href="ordine.html">Ordina ora!</a>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <h1 class="mb-4">Simulazione Ordine</h1>

        <form>
            <div class="mb-3">
                <label class="form-label">Nome Cliente</label>
                <input type="text" class="form-control" placeholder="Es. Mario Rossi">
            </div>

            <div class="mb-3">
                <label class="form-label">Ristorante</label>
                <select class="form-select">
                    <option>Bella Napoli</option>
                    <option>Sushi Zen</option>
                    <option>Old Wild West</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Piatti</label>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="p1">
                    <label class="form-check-label" for="p1">Pizza Margherita</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="p2">
                    <label class="form-check-label" for="p2">Pizza Diavola</label>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Invia Ordine</button>
        </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <footer class="bg-light text-center py-3 mt-4">
        <small>© 2026 TastyDelivery - Contatti: info@tastydelivery.it</small>
    </footer>

</body>

</html>
